<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peter 記帳 - 登入</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .login-icon { font-size: 48px; margin-bottom: 16px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .login-sub { font-size: 13px; color: #888; margin-bottom: 30px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; text-align: left; }
    .input-field {
      width: 100%;
      background: #242424;
      border: 1px solid #333;
      color: #fff;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 4px;
    }
    .input-field:focus { border-color: #5E8EF0; }
    .input-field.error { border-color: #EF4444; animation: shake 0.4s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #5E8EF0, #7C6CF0);
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      margin-top: 20px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:active { transform: scale(0.98); opacity: 0.9; }
    .error-msg { color: #EF4444; font-size: 13px; margin-top: 12px; min-height: 18px; }
    .hint { font-size: 11px; color: #555; margin-top: 24px; }
  </style>
</head>
<body>

<div class="login-box">
  <div class="login-icon">💰</div>
  <div class="login-title">Peter 記帳</div>
  <div class="login-sub">輸入密碼以進入</div>
  
  <div class="input-group">
    <label>密碼</label>
    <input type="password" class="input-field" id="passwordInput" 
           placeholder="• • • •" maxlength="20" autocomplete="off"
           onkeydown="if(event.key==='Enter')tryLogin()">
  </div>
  
  <button class="btn-login" onclick="tryLogin()">登入 →</button>
  <div class="error-msg" id="errorMsg"></div>
  <div class="hint">🔒 私人記帳系統</div>
</div>

<script>
const STORED_KEY = 'expense_auth';
const CORRECT_PASSWORD = '1128';

if (localStorage.getItem(STORED_KEY) === CORRECT_PASSWORD) {
  window.location.href = 'app.html';
}

function tryLogin() {
  const input = document.getElementById('passwordInput');
  const errorMsg = document.getElementById('errorMsg');
  const pwd = input.value.trim();
  
  if (pwd === CORRECT_PASSWORD) {
    localStorage.setItem(STORED_KEY, pwd);
    window.location.href = 'app.html';
  } else {
    input.classList.add('error');
    errorMsg.textContent = '密碼錯誤，請重試';
    input.value = '';
    input.focus();
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

document.getElementById('passwordInput').focus();
</script>

</body>
</html>
